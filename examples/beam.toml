[editor]
tab_width = 4
show_line_numbers = true
status_bar = true
# "default" uses the Beam Nerd Font logo glyph.
status_bar_icon = "default"
status_bar_insert_icon = "󰘶"
status_bar_visual_icon = "󰒉"
split_ratio = 50
background_color = "terminal"
blur = false
opacity = 100
theme = "beam"

[builtins]
enabled = ["hello"]

[keymap]
leader = " "
help = ":help"
save = ":w"
save_as = ":saveas"
close = ":close"
terminal = ":terminal"
quit = ":q"
force_quit = ":q!"
split = ":split"
open = ":open"
reload = ":reload-config"
registers = ":registers"

[keymap.leader]
"w" = "save"
"q" = "quit"
"Q" = "force_quit"
"s" = "window_split_horizontal"
"v" = "window_split_vertical"
"h" = "window_left"
"j" = "window_down"
"k" = "window_up"
"l" = "window_right"
"t" = "tab_next"
"T" = "tab_prev"
"x" = "close_prompt"
